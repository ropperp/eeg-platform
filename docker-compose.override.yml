# Lokale Entwicklung: webapp direkt auf Port 80, kein Traefik nötig.
# Für Produktion (echte Domain + Let's Encrypt): diese Datei löschen oder umbenennen.

services:
  traefik:
    profiles:
      - production   # nur mit --profile production starten

  webapp:
    ports:
      - "80:80"
    labels:
      - "traefik.enable=false"
