# Log-Rotation für ALLE Container: ohne diese Vorgabe schreibt Docker die Container-Logs
# unbegrenzt in json-Dateien -- auf einem Raspberry Pi mit SD-Karte kann das über Wochen die
# Platte volllaufen lassen, wodurch der ganze Host langsam einfriert (Schreibzugriffe hängen,
# Netzwerk/Ping antwortet aber noch -> "im Netz sichtbar, aber kein SSH mehr"). Max. 3 x 10 MB
# pro Container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ─────────────────────────────────────────
  # Reverse Proxy + SSL (Let's Encrypt)
  # ─────────────────────────────────────────
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    logging: *default-logging
    command:
      - "--api.insecure=false"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    environment:
      - DOCKER_API_VERSION=1.40
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/eeg/traefik/letsencrypt:/letsencrypt
    healthcheck:
      # `--ping=true` aktiviert den internen /ping-Endpoint; `traefik healthcheck` fragt ihn ab.
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - eeg-net

  # ─────────────────────────────────────────
  # Datenbank — PostgreSQL 16 + TimescaleDB
  # ─────────────────────────────────────────
  timescaledb:
    # WICHTIG: Image auf feste Digest gepinnt. Der bewegliche Tag ":pg16" hat am 18.06.2026 im
    # Hintergrund eine neue Image-Version gezogen, die ihr Datenverzeichnis von
    # /var/lib/postgresql/data auf /home/postgres/pgdata/data verlegt hat -> der alte Bind-Mount
    # zeigte ins Leere, die DB lief auf flüchtigem Container-Speicher und war nach dem nächsten
    # Neu-Erstellen des Containers "weg" (Details: docs/INFRASTRUKTUR_PFADE.md). Feste Digest +
    # korrekter Mount unten verhindern das. Zum bewussten Aktualisieren: Digest neu setzen.
    image: timescale/timescaledb-ha:pg16@sha256:cbc43994559f407ebdf360f5254da044b05c65a2f8a8d18bc8119eef35ca5803
    container_name: timescaledb
    restart: always
    logging: *default-logging
    volumes:
      # Persistentes Datenverzeichnis. Muss auf das echte PGDATA des timescaledb-ha-Images
      # zeigen: /home/postgres/pgdata (PGDATA = /home/postgres/pgdata/data). NICHT auf
      # /var/lib/postgresql/data -- das benutzt dieses Image NICHT (siehe Kommentar am image
      # oben + docs/INFRASTRUKTUR_PFADE.md). Der Cluster liegt damit auf dem Host unter
      # /opt/eeg/timescaledb/data.
      - /opt/eeg/timescaledb:/home/postgres/pgdata
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - eeg-net

  # ─────────────────────────────────────────
  # Session-Cache
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    logging: *default-logging
    volumes:
      - /opt/eeg/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - eeg-net

  # ─────────────────────────────────────────
  # MQTT Broker
  # ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    logging: *default-logging
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./docker/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - /opt/eeg/mosquitto/data:/mosquitto/data
      - /opt/eeg/mosquitto/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - eeg-net

  # ─────────────────────────────────────────
  # MQTT → TimescaleDB Subscriber (Python)
  # ─────────────────────────────────────────
  mqtt-subscriber:
    build: ./mqtt-subscriber
    container_name: mqtt-subscriber
    restart: always
    logging: *default-logging
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      # Der Subscriber hat keinen HTTP-Endpunkt -> Heartbeat-Datei (main.py schreibt sie, solange
      # die MQTT-Verbindung steht). Gesund, wenn die Datei jünger als 90 s ist.
      test: ["CMD", "python", "-c", "import os,sys,time; sys.exit(0 if os.path.exists('/tmp/mqtt_subscriber_healthy') and time.time()-os.path.getmtime('/tmp/mqtt_subscriber_healthy')<90 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - eeg-net

  # ─────────────────────────────────────────
  # Webapplikation — nginx + PHP 8.2
  # ─────────────────────────────────────────
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: webapp
    restart: always
    logging: *default-logging
    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LATEX_SERVICE_URL: http://latex-service:3210
      LATEX_API_KEY: ${LATEX_API_KEY}
      APP_SECRET: ${APP_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      DOMAIN: ${DOMAIN}
    volumes:
      # Persistente Ablage für Mitglieder-Uploads, Verträge, Beitrittserklärungen etc.
      # (vorher nur im Container — ging bei jedem --build verloren!)
      - /opt/eeg/webapp-storage:/var/www/html/storage
      # Gleiches Host-Verzeichnis wie beim latex-service (siehe dort) -- Platform-Admin kann
      # LaTeX-Vorlagen unter /admin/templates herunter-/hochladen, latex-service liest von
      # dort beim PDF-Rendern.
      - /opt/eeg/latex-templates:/var/www/html/latex-templates
    labels:
      - "traefik.enable=true"
      # Alle Routen laufen über web (HTTP) — nginx macht SSL davor
      - "traefik.http.routers.webapp.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.webapp.entrypoints=web"
      - "traefik.http.routers.live.rule=Host(`live.${DOMAIN}`)"
      - "traefik.http.routers.live.entrypoints=web"
      - "traefik.http.routers.portal.rule=Host(`portal.${DOMAIN}`)"
      - "traefik.http.routers.portal.entrypoints=web"
      - "traefik.http.routers.admin.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=web"
      # Legacy-URL
      - "traefik.http.routers.webapp-legacy.rule=Host(`webapp.mechtronix.at`)"
      - "traefik.http.routers.webapp-legacy.entrypoints=web"
      - "traefik.http.services.webapp.loadbalancer.server.port=80"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - eeg-net

  # ─────────────────────────────────────────
  # PDF-Generator (latex-service)
  # Dateien werden von Patrick geliefert
  # ─────────────────────────────────────────
  latex-service:
    build: ./latex-service
    container_name: latex-service
    restart: always
    logging: *default-logging
    environment:
      API_KEY: ${LATEX_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      # Persistente Ablage der .tex-Vorlagen, damit ein Platform-Admin sie unter
      # /admin/templates herunter-/hochladen kann und Änderungen einen --build überleben
      # (sonst wären sie nur im Image, wie webapp-storage vor der Migration am 14.07.2026).
      # Bleibt das Verzeichnis auf dem Host leer (Erststart), kopiert der Entrypoint einmalig
      # die mitgelieferten Standard-Vorlagen hinein -- sonst startet latex-service ohne
      # jede Vorlage, weil das Volume das im Image gebackene ./templates verdeckt.
      - /opt/eeg/latex-templates:/app/templates
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - eeg-net

networks:
  eeg-net:
    driver: bridge
