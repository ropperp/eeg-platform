name: CI

# Läuft bei jedem Push und Pull Request: prüft alle PHP-Dateien auf Syntaxfehler und führt
# die abhängigkeitsfreie Test-Suite aus (tests/run.php). Kein Composer/PHPUnit nötig.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.2 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP-Syntaxprüfung (lint) über alle .php-Dateien
        run: |
          find webapp tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l >/dev/null

      - name: Unit-Tests
        run: php tests/run.php
