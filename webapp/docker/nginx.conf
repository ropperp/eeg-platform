user www-data;
worker_processes auto;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 20M;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Health-Check
        location = /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Alle Requests durch den PHP-Router
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            # nginx leitet den Authorization-Header NICHT automatisch an PHP-FPM weiter (auch
            # nicht über "include fastcgi_params" -- bekannte nginx+fastcgi-Falle). Ohne diese
            # Zeile käme $_SERVER['HTTP_AUTHORIZATION'] in PHP immer leer an, egal was der
            # Client sendet -- betrifft die API-Key-Authentifizierung unter /api/v1/*.
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        # Statische Assets direkt ausliefern -- aber falls die Datei nicht existiert (z.B.
        # /logo-light.png, /logo-dark.png: das sind dynamische PHP-Routen, keine echten
        # Dateien unter public/), an den PHP-Router durchreichen statt nginx' eigenes 404
        # auszuliefern. Ohne dieses try_files fing dieser Block jede .png/.jpg-Anfrage ab,
        # bevor sie "location /" und damit index.php überhaupt erreichen konnte -- im Browser
        # sichtbar als kaputtes Bild-Icon, obwohl die Datei über /admin/templates korrekt
        # hochgeladen war.
        location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
            try_files $uri /index.php?$query_string;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
