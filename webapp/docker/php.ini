upload_max_filesize = 20M
post_max_size = 20M
session.save_handler = redis
session.save_path = "tcp://redis:6379"
date.timezone = Europe/Vienna

; Wichtig: das Basis-Image (php:8.2-fpm-alpine) lädt kein php.ini-production/-development,
; nur diese eine Datei. Ohne display_errors=Off greift PHPs eincompilierter Default
; (display_errors=On) -- jede Warning/Notice landet dann MITTEN im HTTP-Response, noch bevor
; z.B. header('Location: ...') aufgerufen wird ("headers already sent"), und zerstört die
; Antwort (das war die Ursache mehrerer "500"-Meldungen, die eigentlich harmlose Warnings
; waren). Fehler werden stattdessen geloggt (docker compose logs webapp); der eigene globale
; Error-Handler in index.php zeigt Details weiterhin gezielt für eingeloggte Nutzer an.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
